<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resize Image – FormatConverter</title>
    <link href="/Static/output.css" rel="stylesheet" />
    <style>
        .modal-overlay { background-color: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-slate-700/50 bg-slate-900/95 backdrop-blur relative">
      <div class="mx-auto max-w-7xl px-6">
        <div class="flex h-16 items-center justify-between">
          
          <!-- Left Side: Logo & Icon -->
          <div class="flex items-center gap-2 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500">
              <path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <path d="M3 15h6"></path>
              <path d="M6 12v6"></path>
            </svg>
            <a href="/" class="text-2xl font-extrabold tracking-wide hover:text-indigo-400 transition-colors">
              <h1>Format<span class="text-indigo-500">Converter</span></h1>
            </a>
          </div>

          <!-- Right Side: Desktop Menu & Buttons -->
          <div class="hidden md:flex items-center space-x-8">
            <div class="flex space-x-6">
              <a href="/pdf_Convertion" class="text-slate-300 hover:text-indigo-400 text-sm font-medium transition">PDF Tools</a>
              <a href="/Image_Convertion" class="text-slate-300 hover:text-indigo-400 text-sm font-medium transition">Image Tools</a>
              <a href="/about" class="text-slate-300 hover:text-indigo-400 text-sm font-medium transition">About</a>
            </div>
            
            <div class="h-6 w-px bg-slate-700"></div>

            <div class="flex items-center space-x-4">
              <button class="text-sm font-medium text-slate-300 hover:text-white transition">Sign In</button>
              <button class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 shadow-lg shadow-indigo-500/20 transition text-sm font-semibold text-white">Get Started Free</button>
            </div>
          </div>

          <!-- Mobile Hamburger Button -->
          <div class="-mr-2 flex md:hidden">
            <button id="mobile-menu-button" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-800 focus:outline-none transition">
              <svg id="menu-icon-open" class="block h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
              <svg id="menu-icon-close" class="hidden h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>

        </div>
      </div>

      <!-- FLOATING Mobile Dropdown Menu -->
      <div id="mobile-menu" class="hidden md:hidden absolute left-0 top-full w-full bg-slate-900 border-b border-slate-700 shadow-2xl">
        <div class="px-4 pt-4 pb-4 space-y-2">
          <a href="/pdf_Convertion" class="text-slate-300 hover:text-white hover:bg-slate-800 block px-4 py-3 rounded-xl text-base font-medium transition">PDF Tools</a>
          <a href="/Image_Convertion" class="text-slate-300 hover:text-white hover:bg-slate-800 block px-4 py-3 rounded-xl text-base font-medium transition">Image Tools</a>
          <a href="/about" class="text-slate-300 hover:text-white hover:bg-slate-800 block px-4 py-3 rounded-xl text-base font-medium transition">About</a>
        </div>
        <div class="pt-4 pb-6 border-t border-slate-700 px-5 space-y-3">
          <button class="w-full px-4 py-3 text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 transition border border-slate-700 rounded-xl">Sign In</button>
          <button class="w-full px-5 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 shadow-lg shadow-indigo-500/20 transition text-sm font-semibold text-white">Get Started Free</button>
        </div>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8 sm:py-20">
        <div class="bg-slate-800/60 border border-slate-700 rounded-3xl p-6 sm:p-10 text-center">
            <h2 class="text-2xl font-bold mb-6">Resize Image Workspace</h2>

            <input type="file" id="imageInput" accept="image/*" hidden />

            <!-- Upload Area -->
            <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-2xl p-16 cursor-pointer text-slate-400 hover:border-indigo-500 transition flex flex-col items-center gap-4">
                <div id="uploadUI">
                    <span class="text-4xl">📁</span>
                    <p id="statusText">Click to upload image</p>
                </div>
                <!-- Mini Preview after upload -->
                <img id="previewImg" class="hidden max-h-40 rounded-lg shadow-lg border border-slate-700" />
            </div>

            <button id="processBtn" class="hidden mt-8 px-8 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold transition-all transform hover:scale-105">
                Process Image
            </button>
        </div>
    </div>

    <!-- RESIZE MODAL -->
    <div id="resizeModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6 w-full max-w-md shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Resize Settings</h3>
                <button id="closeResizeModal" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>

            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Width (px)</label>
                    <input type="number" id="widthInput" class="w-full rounded-lg p-3 bg-slate-900 border border-slate-700 text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Height (px)</label>
                    <input type="number" id="heightInput" class="w-full rounded-lg p-3 bg-slate-900 border border-slate-700 text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="aspectRatio" checked class="w-4 h-4 accent-indigo-500" />
                    <label for="aspectRatio" class="text-sm text-slate-400 cursor-pointer">Lock aspect ratio</label>
                </div>
            </div>

            <div class="flex gap-4">
                <button id="cancelResize" class="flex-1 px-5 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition font-semibold">Cancel</button>
                <button id="applyResize" class="flex-1 px-5 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold shadow-lg shadow-indigo-500/20 transition">Save & Download</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.getElementById("imageInput");
        const processBtn = document.getElementById("processBtn");
        const previewImg = document.getElementById("previewImg");
        const uploadUI = document.getElementById("uploadUI");
        const statusText = document.getElementById("statusText");

        const resizeModal = document.getElementById("resizeModal");
        const widthInput = document.getElementById("widthInput");
        const heightInput = document.getElementById("heightInput");
        const aspectCheck = document.getElementById("aspectRatio");

        let originalImage = new Image();
        let originalRatio = 1;

        // 1. Handle File Upload
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    originalImage.src = event.target.result;
                    originalImage.onload = () => {
                        // Show preview and process button
                        previewImg.src = event.target.result;
                        previewImg.classList.remove("hidden");
                        uploadUI.classList.add("hidden");
                        processBtn.classList.remove("hidden");
                        statusText.innerText = file.name;
                        
                        // Set initial dimensions
                        widthInput.value = originalImage.width;
                        heightInput.value = originalImage.height;
                        originalRatio = originalImage.width / originalImage.height;
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        // 2. Open Modal
        processBtn.onclick = () => resizeModal.classList.remove("hidden");

        // 3. Aspect Ratio Logic
        widthInput.oninput = () => {
            if (aspectCheck.checked) {
                heightInput.value = Math.round(widthInput.value / originalRatio);
            }
        };

        heightInput.oninput = () => {
            if (aspectCheck.checked) {
                widthInput.value = Math.round(heightInput.value * originalRatio);
            }
        };

        // 4. Close Modal (No reset)
        const closeModal = () => resizeModal.classList.add("hidden");
        document.getElementById("closeResizeModal").onclick = closeModal;
        document.getElementById("cancelResize").onclick = closeModal;

        // 5. Process and Download
        document.getElementById("applyResize").onclick = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            
            canvas.width = parseInt(widthInput.value);
            canvas.height = parseInt(heightInput.value);
            
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            
            // Trigger Download
            const link = document.createElement("a");
            link.download = "resized-image.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            
            closeModal();
        };
    </script>

    <script>
      const mobileMenuButton = document.getElementById('mobile-menu-button');
      const mobileMenu = document.getElementById('mobile-menu');
      const openIcon = document.querySelector('#mobile-menu-button svg.block');
      const closeIcon = document.querySelector('#mobile-menu-button svg.hidden');

      if (mobileMenuButton) {
          mobileMenuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            openIcon.classList.toggle('hidden');
            openIcon.classList.toggle('block');
            closeIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('block');
          });
      }
    </script>
</body>
</html>
