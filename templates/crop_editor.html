    <div class="max-w-3xl mx-auto px-6 py-12">
      <div class="bg-slate-800/60 border border-slate-700 rounded-3xl p-8">
        <input type="file" id="fileInput" accept="image/*" hidden />

        <div
          id="dropZone"
          class="border-2 border-dashed border-slate-500 rounded-2xl p-12 text-center cursor-pointer"
        >
          Click to upload image
        </div>

        <button
          id="processBtn"
          class="hidden mt-8 px-8 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold"
        >
          Process Image
        </button>

        <!-- <button
          id="processBtn"
          class="hidden w-full mt-6 px-6 py-3 rounded-xl bg-indigo-600 font-bold"
        >
          Open Crop Tool
        </button> -->
      </div>
    </div>

    <div
      id="cropModal"
      class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4"
    >
      <div
        class="bg-slate-800 border border-slate-700 rounded-3xl p-6 w-full max-w-3xl shadow-2xl relative"
      >
        <!-- Header -->
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold">Crop Image</h3>
          <button
            id="closeCropModal"
            class="text-2xl text-slate-400 hover:text-white leading-none"
          >
            ×
          </button>
        </div>

        <!-- Preview Area -->
        <div
          class="bg-slate-900 rounded-xl h-105 flex items-center justify-center border border-slate-700 mb-6"
        >
          <canvas id="cropCanvas" class="max-w-full max-h-full"></canvas>
        </div>

        <!-- Actions -->
        <div class="flex gap-4">
          <button
            id="cancelCrop"
            class="flex-1 px-5 py-3 rounded-xl bg-slate-700 hover:bg-slate-600"
          >
            Cancel
          </button>
          <button
            id="applyCrop"
            class="flex-1 px-5 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold"
          >
            Apply Crop
          </button>
        </div>
      </div>
    </div>

    <footer
      class="border-t border-slate-700 py-10 text-center text-slate-400 mt-auto"
    >
      © 2026 ImageMorph. Intelligent Visual Tools. Made in INDIA.
    </footer>

    <script>
      const closeBtn = document.getElementById("closeCropModal");
      const cancelBtn = document.getElementById("cancelCrop");
      const cropCanvas = document.getElementById("cropCanvas");
      const cropCtx = cropCanvas.getContext("2d");

      let img = new Image();
      let imageLoaded = false;

      closeBtn.onclick = cancelBtn.onclick = () => {
        cropModal.classList.add("hidden");
        cropModal.classList.remove("flex");
      };

      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const processBtn = document.getElementById("processBtn");
      const cropModal = document.getElementById("cropModal");

      fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          img.src = event.target.result;
          img.onload = () => {
            imageLoaded = true;
            processBtn.classList.remove("hidden");
          };
        };
        reader.readAsDataURL(file);
      };

      function drawCropImage() {
        const maxW = 500;
        const maxH = 350;
        const ratio = Math.min(maxW / img.width, maxH / img.height);

        cropCanvas.width = img.width * ratio;
        cropCanvas.height = img.height * ratio;

        cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        cropCtx.drawImage(img, 0, 0, cropCanvas.width, cropCanvas.height);
      }

      processBtn.onclick = () => {
        if (!imageLoaded) {
          alert("Upload image first");
          return;
        }

        drawCropImage(); // ✅ DRAW FIRST
        cropModal.classList.remove("hidden");
        cropModal.classList.add("flex");
      };
    </script>
  </body>
